<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="pageTitle">StudyVault</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --c-bg: #05000A;
            --c-surface: #0E0018;
            --c-border: rgba(180, 80, 255, 0.15);
            --c-rose: #B450FF;
            --c-text: #F0E8FF;
            --c-textMuted: rgba(240, 232, 255, 0.5);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--c-bg); color: var(--c-text); font-family: 'Sora', sans-serif; overflow: hidden; }

        /* --- LAG FIX INJECTION --- */
        .blossom {
            position: absolute;
            will-change: transform;
            transform: translateZ(0); /* Forces GPU to handle petals */
        }
        .msg-bubble { transform: translateZ(0); }
        /* ------------------------ */

        .blossom-container { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
        @keyframes blossomFall {
            0% { transform: translateY(0) translateX(0) rotate(0); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(110vh) translateX(var(--bx)) rotate(720deg); opacity: 0; }
        }

        .study-site { position: relative; z-index: 10; width: 100%; height: 100%; display: flex; flex-direction: column; overflow-y: auto; }
        .nav { height: 72px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; border-bottom: 1px solid var(--c-border); }
        .nav-brand { font-size: 22px; font-weight: 700; }
        
        .hero { padding: 60px 24px; text-align: center; }
        .hero h1 { font-size: 42px; margin-bottom: 12px; }
        .hero-stats { display: flex; justify-content: center; gap: 40px; margin-top: 32px; }
        .stat-val { display: block; font-size: 28px; font-weight: 700; color: var(--c-rose); }
        .stat-lbl { font-size: 12px; text-transform: uppercase; color: var(--c-textMuted); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; padding: 40px 24px; max-width: 1200px; margin: 0 auto; }
        .subject-card { background: var(--c-surface); border: 1.5px solid var(--c-border); border-radius: 28px; padding: 32px; cursor: pointer; transition: 0.3s; }
        .subject-icon { font-size: 48px; margin-bottom: 20px; }
        .subject-title { font-size: 22px; font-weight: 700; }

        #chatApp { position: fixed; inset: 0; z-index: 2000; background: var(--c-bg); display: none; }
        #chatApp.visible { display: flex; flex-direction: column; }
        
        #unlockScreen { position: absolute; inset: 0; z-index: 2100; background: var(--c-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .gesture-area { width: 300px; height: 350px; background: rgba(180,80,255,0.03); border: 2px dashed var(--c-border); border-radius: 40px; }

        #chatMain { flex: 1; display: flex; flex-direction: column; position: relative; }
        .messages-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .input-wrap { padding: 20px; background: var(--c-surface); border-top: 1px solid var(--c-border); }
        .input-box { background: #160028; border-radius: 28px; display: flex; align-items: center; padding: 10px 20px; border: 1px solid var(--c-border); }
        textarea { flex: 1; background: transparent; border: none; color: white; padding: 10px; resize: none; font-family: inherit; }
        #sendBtn { background: var(--c-rose); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-weight: bold; cursor: pointer; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="blossom-container" id="blossomContainer"></div>

    <div class="study-site" id="studyPage">
        <nav class="nav">
            <div class="nav-brand" id="brandName">StudyVault</div>
            <button id="openSidebar" style="background:none; border:none; color:white; font-size:24px;">≡</button>
        </nav>
        <div class="hero">
            <h1>Hello, Study Buddy</h1>
            <div class="hero-stats">
                <div class="stat-item"><span class="stat-val" id="statSubjects">0</span><span class="stat-lbl">Subjects</span></div>
                <div class="stat-item"><span class="stat-val" id="statChapters">0</span><span class="stat-lbl">Chapters</span></div>
            </div>
        </div>
        <div class="grid" id="subjectsGrid"></div>
    </div>

    <div id="chatApp">
        <div id="unlockScreen">
            <div class="gesture-area" id="gestureCanvas"></div>
            <input type="text" id="nameInput" style="margin-top:20px; background:var(--c-surface); border:1px solid var(--c-border); color:white; padding:12px; border-radius:12px; width:260px; text-align:center;" placeholder="Enter Name">
            <button id="enterChat" style="margin-top:12px; background:var(--c-rose); color:white; border:none; padding:12px 40px; border-radius:12px; font-weight:bold;">Unlock Chat</button>
        </div>
        <div id="chatMain" class="hidden">
            <div class="messages-area" id="messagesArea"><div id="messagesInner"></div></div>
            <div class="input-wrap">
                <div class="input-box">
                    <textarea id="msgInput" placeholder="Message..." rows="1"></textarea>
                    <button id="sendBtn">↑</button>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script type="module" src="chat.js"></script>
    <script>
        /* --- GESTURE UNLOCK (RESTORED) --- */
        (function() {
            const canvas = document.getElementById('gestureCanvas');
            let points = []; let isDrawing = false;
            canvas.addEventListener('pointerdown', e => { isDrawing = true; points = [[e.offsetX, e.offsetY]]; });
            canvas.addEventListener('pointermove', e => { if (!isDrawing) return; points.push([e.offsetX, e.offsetY]); });
            canvas.addEventListener('pointerup', () => {
                isDrawing = false;
                if (checkZ(points)) {
                    document.getElementById('chatApp').style.display = 'flex';
                    document.getElementById('chatApp').classList.add('visible');
                }
                points = [];
            });
            function checkZ(pts) {
                if (pts.length < 10) return false;
                const left = Math.min(...pts.map(p => p[0])), right = Math.max(...pts.map(p => p[0]));
                const top = Math.min(...pts.map(p => p[1])), bottom = Math.max(...pts.map(p => p[1]));
                const w = right - left, h = bottom - top;
                if (w < 40 || h < 40) return false;
                const start = pts[0], end = pts[pts.length - 1];
                return start[0] < left + w/3 && start[1] < top + h/3 && end[0] > right - w/3 && end[1] > bottom - h/3;
            }
        })();
    </script>
</body>
</html>
