<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title id="pageTitle">StudyVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --c-bg: #05000A;
      --c-surface: #0E0018;
      --c-surfaceHigh: #160028;
      --c-border: rgba(180, 80, 255, 0.15);
      --c-rose: #B450FF;
      --c-blush: #D4A5FF;
      --c-magenta: #7A28FF;
      --c-text: #F0E8FF;
      --c-textMuted: rgba(240, 232, 255, 0.5);
      --c-myBubble: linear-gradient(135deg, #B450FF, #7A28FF);
      --c-herBubble: #160028;
      --font-main: 'Sora', sans-serif;
      --font-ui: 'Outfit', sans-serif;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--c-bg); color: var(--c-text); font-family: var(--font-main); overflow: hidden; }

    /* Performance Optimized Blossoms */
    .blossom-container { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
    .blossom {
      position: absolute;
      top: -10%;
      border-radius: 50% 10% 50% 10% / 50% 20% 50% 20%;
      animation: blossomFall linear infinite;
      will-change: transform;
      transform: translateZ(0);
    }
    @keyframes blossomFall {
      0% { transform: translateY(0) translateX(0) rotate(0) translateZ(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(110vh) translateX(var(--bx)) rotate(720deg) translateZ(0); opacity: 0; }
    }

    /* Study Site Core */
    .study-site { 
      position: relative; 
      z-index: 10; 
      width: 100%; 
      height: 100vh; 
      display: flex; 
      flex-direction: column; 
      background: radial-gradient(circle at 50% -20%, rgba(180,80,255,0.15), transparent); 
    }

    .nav { 
      height: 60px; 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      padding: 0 20px; 
      border-bottom: 1px solid var(--c-border); 
      backdrop-filter: blur(10px); 
      flex-shrink: 0;
    }
    .nav-brand { font-size: 20px; font-weight: 700; color: var(--c-text); letter-spacing: -0.5px; }
    .nav-search { position: relative; flex: 1; max-width: 400px; margin: 0 20px; }
    .nav-search input { width: 100%; background: var(--c-surface); border: 1.5px solid var(--c-border); border-radius: 12px; padding: 10px 16px; color: var(--c-text); font-family: var(--font-ui); transition: 0.2s; }

    .hero { padding: 30px 20px; text-align: center; flex-shrink: 0; }
    .hero h1 { font-size: 28px; margin: 0 0 8px 0; background: linear-gradient(to right, #FFF, #B450FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero-stats { display: flex; justify-content: center; gap: 16px; margin-top: 15px; }
    .stat-item { background: var(--c-surface); padding: 10px 16px; border-radius: 14px; border: 1px solid var(--c-border); }
    .stat-val { display: block; font-size: 18px; font-weight: 700; color: var(--c-rose); }
    .stat-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--c-textMuted); }

    /* FIXED GRID SYSTEM */
    .grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
      grid-auto-rows: min-content; 
      gap: 16px; 
      padding: 20px; 
      max-width: 1000px; 
      margin: 0 auto; 
      overflow-y: auto; 
      flex: 1; 
      width: 100%;
      -webkit-overflow-scrolling: touch;
    }

    .subject-card { 
      background: var(--c-surface); 
      border: 1.5px solid var(--c-border); 
      border-radius: 20px; 
      padding: 20px; 
      cursor: pointer; 
      transition: 0.3s; 
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      height: auto;
      min-height: 150px;
    }
    .subject-card:active { transform: scale(0.97); background: var(--c-surfaceHigh); }
    .subject-icon { font-size: 32px; margin-bottom: 12px; }
    .subject-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; color: var(--c-text); }
    .subject-chapters { color: var(--c-textMuted); font-size: 12px; }

    /* Mobile-Specific Tweaks */
    @media (max-width: 480px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; }
      .nav-search { display: none; }
      .hero h1 { font-size: 24px; }
    }

    /* Chat App Styles */
    #chatApp { position: fixed; inset: 0; z-index: 2000; background: var(--c-bg); display: none; flex-direction: column; opacity: 0; transition: opacity 0.4s ease; }
    #chatApp.visible { display: flex; opacity: 1; }
    #unlockScreen { position: absolute; inset: 0; z-index: 2100; background: var(--c-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .gesture-area { width: 260px; height: 300px; background: rgba(180,80,255,0.03); border: 2px dashed var(--c-border); border-radius: 30px; position: relative; margin-bottom: 20px; }
    .unlock-input { background: var(--c-surfaceHigh); border: 1.5px solid var(--c-border); border-radius: 12px; padding: 12px; color: var(--c-text); width: 100%; max-width: 260px; text-align: center; margin-bottom: 12px; font-family: var(--font-ui); }
    .unlock-btn { background: var(--c-rose); border: none; border-radius: 12px; padding: 12px 40px; color: #FFF; font-weight: 700; cursor: pointer; width: 100%; max-width: 260px; }

    #chatMain { flex: 1; display: flex; overflow: hidden; position: relative; }
    .chat-window { flex: 1; display: flex; flex-direction: column; position: relative; background-size: cover; background-position: center; }
    .chat-header { height: 60px; border-bottom: 1px solid var(--c-border); display: flex; align-items: center; padding: 0 16px; backdrop-filter: blur(15px); background: rgba(14,0,24,0.7); z-index: 10; }
    .messages-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .msg-row { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; }
    .msg-row.mine { align-self: flex-end; flex-direction: row-reverse; }
    .msg-bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; transform: translateZ(0); }
    .mine .msg-bubble { background: var(--c-myBubble); color: #FFF; border-bottom-right-radius: 4px; }
    .theirs .msg-bubble { background: var(--c-herBubble); border: 1px solid var(--c-border); border-bottom-left-radius: 4px; }

    .input-wrap { padding: 12px; background: var(--c-surface); border-top: 1px solid var(--c-border); }
    .input-box { background: var(--c-surfaceHigh); border-radius: 20px; display: flex; align-items: center; padding: 6px 12px; border: 1px solid var(--c-border); }
    .input-box textarea { flex: 1; background: transparent; border: none; color: var(--c-text); padding: 8px; resize: none; max-height: 100px; font-size: 14px; }
    
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="blossom-container" id="blossomContainer"></div>

  <div class="study-site" id="studySite">
    <nav class="nav">
      <div class="nav-brand" id="brandName">StudyVault</div>
      <div class="nav-search"><input type="text" id="searchInput" placeholder="Search notes..."></div>
      <button id="openSidebar" style="background:none; border:none; color:var(--c-text); font-size:22px;">☰</button>
    </nav>

    <div class="hero">
      <h1>Hello, Study Buddy</h1>
      <p style="color:var(--c-textMuted); font-size:14px; margin:0;">Access your exam notes instantly.</p>
      <div class="hero-stats">
        <div class="stat-item"><span class="stat-val" id="statSubjects">0</span><span class="stat-lbl">Subjects</span></div>
        <div class="stat-item"><span class="stat-val" id="statChapters">0</span><span class="stat-lbl">Chapters</span></div>
      </div>
    </div>

    <div class="grid" id="subjectsGrid"></div>
  </div>

  <div id="chatApp" class="hidden">
    <div id="unlockScreen">
      <div class="gesture-area" id="gestureCanvas">
        <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--c-textMuted); font-size:11px; text-transform:uppercase; text-align:center; padding:20px;">Draw "Z" to Unlock Chat</div>
      </div>
      <input type="text" id="nameInput" class="unlock-input" placeholder="Enter Name">
      <button id="enterChat" class="unlock-btn">Join Chat</button>
      <div id="roomHint" style="margin-top:15px; font-size:10px; color:var(--c-textMuted); letter-spacing:1px;"></div>
    </div>

    <div id="chatMain" class="hidden">
      <div class="blossom-container" id="chatBlossoms"></div>
      
      <main class="chat-window">
        <header class="chat-header">
          <div style="flex:1;">
            <div id="chatRoomName" style="font-weight:700; font-size:15px;">-</div>
            <div id="chatOnline" style="font-size:10px; color:var(--c-rose);">Connecting...</div>
          </div>
          <button id="callBtn" style="background:none; border:none; font-size:18px;">📞</button>
        </header>

        <div class="messages-area" id="messagesArea">
          <div id="messagesInner" style="display:flex; flex-direction:column; gap:10px;"></div>
          <div id="typingBar" style="font-size:10px; color:var(--c-textMuted); height:12px; margin-top:5px;"></div>
        </div>

        <div class="input-wrap">
          <div class="input-box">
            <button id="stickerToggle" style="background:none; border:none; font-size:20px;">😊</button>
            <textarea id="msgInput" placeholder="Message..." rows="1"></textarea>
            <button id="attachBtn" style="background:none; border:none; font-size:20px;">📎</button>
            <button id="sendBtn" style="background:var(--c-rose); border:none; width:32px; height:32px; border-radius:50%; color:white; font-size:16px; margin-left:8px;">↑</button>
          </div>
          <input type="file" id="mediaInput" class="hidden">
        </div>
      </main>
    </div>
  </div>

  <script src="config.js"></script>
  <script type="module" src="chat.js"></script>
  <script>
    /* Optimized Gesture Logic */
    (function() {
      const canvas = document.getElementById('gestureCanvas');
      let points = []; let isDrawing = false;
      canvas.addEventListener('pointerdown', e => { isDrawing = true; points = [[e.offsetX, e.offsetY]]; });
      canvas.addEventListener('pointermove', e => { if (!isDrawing) return; points.push([e.offsetX, e.offsetY]); });
      canvas.addEventListener('pointerup', () => {
        isDrawing = false;
        if (checkZ(points)) {
            document.getElementById('chatApp').classList.remove('hidden');
            document.getElementById('chatApp').classList.add('visible');
        }
        points = [];
      });
      function checkZ(pts) {
        if (pts.length < 10) return false;
        const left = Math.min(...pts.map(p => p[0])), right = Math.max(...pts.map(p => p[0]));
        const top = Math.min(...pts.map(p => p[1])), bottom = Math.max(...pts.map(p => p[1]));
        const w = right - left, h = bottom - top;
        if (w < 40 || h < 40) return false;
        const start = pts[0], end = pts[pts.length - 1];
        return start[0] < left + w/3 && start[1] < top + h/3 && end[0] > right - w/3 && end[1] > bottom - h/3;
      }
    })();
  </script>
</body>
</html>
